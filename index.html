<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>브롤스타즈 토너먼트 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0248BB;font-family:'Noto Sans KR',sans-serif;min-height:100vh;color:#fff}
.bhs{font-family:'Black Han Sans',sans-serif}
button{cursor:pointer;border:none;outline:none}
input{outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
::-webkit-scrollbar-thumb{background:#FFE234;border-radius:3px}
/* Header */
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,28,70,.92);
  border-bottom:2px solid #FFE234;padding:12px 20px;
  display:flex;align-items:center;gap:12px;min-height:52px}
.hdr-title{font-size:20px;color:#FFE234;letter-spacing:1px}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.55)}
/* Setup */
.setup-wrap{max-width:720px;margin:0 auto;padding:32px 20px}
.setup-card{background:rgba(0,0,0,.32);border-radius:16px;padding:28px;
  border:1px solid rgba(255,226,52,.15)}
.setup-title{font-size:16px;color:#FFE234;margin-bottom:14px}
.count-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.count-btn{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.1);
  color:#fff;font-size:20px;font-weight:700;line-height:1;transition:.15s}
.count-btn:hover{background:rgba(255,226,52,.2);color:#FFE234}
.count-inp{width:72px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);
  border-radius:8px;padding:6px;text-align:center;font-size:20px;font-weight:700;color:#fff}
.bracket-hint{font-size:12px;color:rgba(255,226,52,.7);margin-bottom:22px;padding:8px 12px;
  background:rgba(255,226,52,.06);border-radius:8px;border:1px solid rgba(255,226,52,.15)}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;
  max-height:340px;overflow-y:auto;padding-right:4px}
.team-input-wrap{display:flex;align-items:center;gap:7px}
.team-num{width:26px;height:26px;border-radius:50%;background:#0248BB;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#FFE234;flex-shrink:0}
.team-input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  border-radius:7px;padding:7px 10px;color:#fff;font-size:13px}
.team-input:focus{border-color:#FFE234}
.team-input::placeholder{color:rgba(255,255,255,.28)}
.start-btn{width:100%;padding:14px;border-radius:12px;background:#FFE234;
  color:#0248BB;font-size:17px;font-weight:700;transition:.15s}
.start-btn:hover{background:#fff}
/* Bracket layout */
.bk-layout{display:flex;height:calc(100vh - 52px)}
.sidebar{width:190px;flex-shrink:0;background:rgba(0,0,0,.45);
  border-right:1px solid rgba(255,226,52,.15);padding:14px;
  overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.sidebar-title{font-size:12px;color:#FFE234;font-weight:700;
  padding-bottom:7px;border-bottom:1px solid rgba(255,226,52,.18)}
.sidebar-team{padding:7px 11px;border-radius:7px;background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.14);font-size:12px;cursor:grab;
  transition:.15s;user-select:none;display:flex;align-items:center;gap:6px}
.sidebar-team::before{content:'\2807';color:rgba(255,255,255,.3);font-size:14px;flex-shrink:0}
.sidebar-team:hover{background:rgba(255,226,52,.15);border-color:#FFE234}
.sidebar-team:hover::before{color:#FFE234}
.sidebar-team.dragging{opacity:.35}
.sidebar-empty{font-size:11px;color:rgba(255,255,255,.3);text-align:center;margin-top:6px}
.sidebar-actions{margin-top:auto;display:flex;flex-direction:column;gap:7px;padding-top:10px}
.action-btn{width:100%;padding:8px;border-radius:7px;font-size:12px;font-weight:700;transition:.15s}
.action-btn.primary{background:#FFE234;color:#0248BB}
.action-btn.primary:hover{background:#fff}
.action-btn.ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.65);
  border:1px solid rgba(255,255,255,.15)}
.action-btn.ghost:hover{background:rgba(255,255,255,.15)}
.action-btn.danger{background:rgba(255,60,60,.1);color:#ff9090;
  border:1px solid rgba(255,60,60,.25)}
.action-btn.danger:hover{background:rgba(255,60,60,.2)}
/* Canvas */
.bk-canvas-wrap{flex:1;overflow:auto;padding:20px}
.bk-canvas{position:relative;margin:0 auto}
.bk-svg{position:absolute;top:0;left:0;pointer-events:none}
/* Champion */
.champ-slot{position:absolute;display:flex;align-items:center;justify-content:center}
.champ-box{background:linear-gradient(135deg,#ffd000,#ff8c00);
  border-radius:10px;padding:5px 16px;min-width:130px;text-align:center;
  box-shadow:0 0 18px rgba(255,208,0,.5)}
.champ-name{font-size:13px;font-weight:700;color:#3a1a00}
.champ-empty{min-width:130px;height:38px;border:2px dashed rgba(255,208,0,.35);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:rgba(255,208,0,.45)}
/* Match box */
.match-box{position:absolute;border-radius:7px;overflow:hidden;
  border:1px solid rgba(255,255,255,.14);transition:border-color .15s,box-shadow .15s}
.match-box.has-result{border-color:rgba(255,226,52,.3)}
.match-hdr{display:flex;align-items:center;justify-content:flex-end;padding:0 5px;
  background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.06)}
.match-hdr-btn{background:none;color:rgba(255,255,255,.4);font-size:11px;padding:2px 4px;
  border-radius:4px;cursor:pointer;line-height:1;transition:.1s}
.match-hdr-btn:hover{background:rgba(255,226,52,.15);color:#FFE234}
.match-slot{display:flex;align-items:center;padding:0 7px;gap:5px;
  transition:background .12s;border:1px solid transparent}
.match-slot.team-slot{cursor:grab}
.match-slot.team-slot:active{cursor:grabbing}
.match-slot.winner-slot{background:rgba(255,226,52,.12)}
.match-slot.loser-slot{opacity:.38}
.match-slot.drag-over{background:rgba(255,226,52,.22) !important;
  border-color:#FFE234 !important}
.match-slot.empty-slot{border:1px dashed rgba(255,255,255,.15);
  background:rgba(255,255,255,.02);cursor:default}
.match-slot.bye-slot{background:rgba(255,255,255,.04);cursor:default}
.slot-name{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-score{font-size:10px;font-weight:700;color:#FFE234;min-width:12px;text-align:right}
.slot-drag-hint{font-size:9px;color:rgba(255,255,255,.2)}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.68);
  display:flex;align-items:center;justify-content:center;z-index:200}
.modal-card{background:#0a1c46;border:1px solid rgba(255,226,52,.3);
  border-radius:14px;padding:24px;min-width:300px;max-width:380px;width:90%}
.modal-title{font-size:15px;color:#FFE234;margin-bottom:18px;text-align:center}
.winner-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.winner-btn{padding:12px 6px;border-radius:9px;font-size:13px;font-weight:700;
  background:rgba(255,255,255,.08);color:#fff;border:2px solid rgba(255,255,255,.14);
  transition:.15s;word-break:break-all;text-align:center}
.winner-btn:hover:not(:disabled){border-color:#FFE234;background:rgba(255,226,52,.12)}
.winner-btn.selected{background:#FFE234;color:#0248BB;border-color:#FFE234}
.winner-btn:disabled{opacity:.3;cursor:default}
.bye-btn{grid-column:1/-1;padding:10px;border-radius:9px;font-size:13px;font-weight:700;
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);
  border:1px dashed rgba(255,255,255,.25);transition:.15s}
.bye-btn:hover{background:rgba(255,255,255,.14);color:#fff}
.score-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.score-input{width:56px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  border-radius:7px;padding:7px;text-align:center;font-size:19px;font-weight:700;color:#fff}
.score-sep{font-size:20px;font-weight:700;color:rgba(255,255,255,.4)}
.modal-btns{display:flex;gap:9px}
.modal-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;transition:.15s}
.modal-btn.confirm{background:#FFE234;color:#0248BB}
.modal-btn.confirm:hover{background:#fff}
.modal-btn.confirm:disabled{opacity:.4;cursor:default}
.modal-btn.cancel{background:rgba(255,255,255,.08);color:rgba(255,255,255,.55)}
.modal-btn.cancel:hover{background:rgba(255,255,255,.14)}
.modal-btn.reset{background:rgba(255,50,50,.1);color:#ff9090;border:1px solid rgba(255,50,50,.25)}
.modal-btn.reset:hover{background:rgba(255,50,50,.2)}
@keyframes diagonalScroll{0%{background-position:0 0}100%{background-position:130px 130px}}
</style>
</head>

/* ── Helpers ── */
function nextPow2(n){let p=1;while(p<n)p<<=1;return p;}
const GOLD='#FFE234';

/* ── Layout ── */
function getSizes(nLeaf){
  if(nLeaf<=4)  return {MW:160,MH:56,HDR:18,GX:48,GY:80,PX:32,PY:24,CH:44,CG:16};
  if(nLeaf<=8)  return {MW:150,MH:54,HDR:17,GX:40,GY:72,PX:28,PY:22,CH:42,CG:14};
  if(nLeaf<=16) return {MW:130,MH:50,HDR:16,GX:30,GY:64,PX:24,PY:20,CH:40,CG:12};
  return          {MW:110,MH:48,HDR:15,GX:22,GY:56,PX:20,PY:18,CH:38,CG:10};
}

function matchCX(round,pos,numRounds,S){
  const LW=S.MW+S.GX;
  if(round===numRounds-1) return S.PX+pos*LW+S.MW/2;
  const l=matchCX(round+1,pos*2,numRounds,S);
  const r=matchCX(round+1,pos*2+1,numRounds,S);
  return(l+r)/2;
}
function matchTY(round,S){return S.PY+S.CH+S.CG+round*(S.MH+S.GY);}
function bracketDims(numRounds,S){
  const nLeaf=1<<(numRounds-1);
  const LW=S.MW+S.GX;
  const w=S.PX*2+nLeaf*LW-S.GX;
  const h=S.PY+S.CH+S.CG+numRounds*(S.MH+S.GY)-S.GY+S.PY;
  return{w:Math.max(380,w),h};
}
function buildLines(matches,numRounds,S){
  const lines=[];
  for(let r=1;r<numRounds;r++){
    const count=1<<r;
    for(let p=0;p<count;p++){
      const m=matches.find(x=>x.round===r&&x.pos===p);
      const par=matches.find(x=>x.round===r-1&&x.pos===(p>>1));
      if(!m||!par) continue;
      const cx=matchCX(r,p,numRounds,S);
      const ty=matchTY(r,S);
      const pcx=matchCX(r-1,p>>1,numRounds,S);
      const pby=matchTY(r-1,S)+S.MH;
      const midY=(pby+ty)/2;
      const parSlot=p%2===0?par.teamA:par.teamB;
      // Highlight only if winner is in parent slot AND parent hasn't chosen a different winner
      const isWin=!!(m.winner&&m.winner===parSlot&&(!par.winner||par.winner===m.winner));
      lines.push({key:`${r}-${p}`,
        d:`M ${pcx} ${pby} L ${pcx} ${midY} L ${cx} ${midY} L ${cx} ${ty}`,
        isWin});
    }
  }
  const fin=matches.find(x=>x.round===0&&x.pos===0);
  const fcx=matchCX(0,0,numRounds,S);
  lines.push({key:'champ',
    d:`M ${fcx} ${S.PY+S.CH} L ${fcx} ${matchTY(0,S)}`,
    isWin:!!(fin&&fin.winner)});
  return lines;
}

/* ── Match Init ── */
function initMatches(numTeams){
  const P=nextPow2(numTeams);
  const numRounds=Math.log2(P);
  const ms=[];
  for(let r=0;r<numRounds;r++){
    for(let p=0;p<(1<<r);p++){
      ms.push({id:`r${r}p${p}`,round:r,pos:p,
        teamA:null,teamB:null,winner:null,scoreA:'',scoreB:'',bye:false});
    }
  }
  return{matches:ms,numRounds};
}

/* ── MatchBox ── */
function MatchBox({match,numRounds,S,onDrop,onEditClick,dragTeam,setDragTeam}){
  const [overA,setOverA]=useState(false);
  const [overB,setOverB]=useState(false);
  const cx=matchCX(match.round,match.pos,numRounds,S);
  const ty=matchTY(match.round,S);
  const hw=match.winner;
  const isBye=match.bye;

  const startDrag=(e,slot)=>{
    const name=slot==='A'?match.teamA:match.teamB;
    if(!name||hw) return e.preventDefault();
    setDragTeam({name,fromMatchId:match.id,fromSlot:slot});
    e.dataTransfer.effectAllowed='move';
    e.stopPropagation();
  };
  const onDragOver=(e,slot)=>{
    e.preventDefault();
    if(slot==='A') setOverA(true); else setOverB(true);
  };
  const onDragLeave=(slot)=>{
    if(slot==='A') setOverA(false); else setOverB(false);
  };
  const onDropSlot=(e,slot)=>{
    e.preventDefault();
    setOverA(false);setOverB(false);
    if(!dragTeam) return;
    onDrop(match.id,slot,dragTeam);
  };

  const slotCls=(team,isA)=>{
    let c='match-slot';
    if(!team) c+=' empty-slot';
    else if(hw){if(hw===team) c+=' winner-slot'; else c+=' loser-slot';}
    else c+=' team-slot';
    if(isBye&&!team) c+=' bye-slot';
    if((isA&&overA)||(!isA&&overB)) c+=' drag-over';
    return c;
  };

  const fontSize=S.MH<=48?10:S.MH<=52?11:12;
  const slotH=(S.MH-S.HDR)/2;

  return(
    <div className={'match-box'+(hw?' has-result':'')}
      style={{position:'absolute',left:cx-S.MW/2,top:ty,width:S.MW,height:S.MH,
        background:'rgba(5,15,45,0.72)'}}>
      {/* Header with edit button */}
      <div className="match-hdr" style={{height:S.HDR}}>
        <button className="match-hdr-btn" onClick={onEditClick}
          style={{fontSize:S.HDR-6}}>
          &#9998;
        </button>
      </div>
      {/* Slot A */}
      <div className={slotCls(match.teamA,true)}
        style={{height:slotH,borderBottom:'1px solid rgba(255,255,255,.07)'}}
        draggable={!!(match.teamA&&!hw)}
        onDragStart={e=>startDrag(e,'A')}
        onDragOver={e=>onDragOver(e,'A')}
        onDragLeave={()=>onDragLeave('A')}
        onDrop={e=>onDropSlot(e,'A')}>
        <span className="slot-name" style={{fontSize,color:match.teamA?'#fff':'rgba(255,255,255,.2)'}}>
          {match.teamA||(isBye?'부전승':'—')}
        </span>
        {hw===match.teamA&&match.teamA&&<span style={{fontSize:10}}>&#127942;</span>}
        {hw&&match.scoreA!==''&&!match.bye&&<span className="slot-score">{match.scoreA}</span>}
      </div>
      {/* Slot B */}
      <div className={slotCls(match.teamB,false)}
        style={{height:slotH}}
        draggable={!!(match.teamB&&!hw)}
        onDragStart={e=>startDrag(e,'B')}
        onDragOver={e=>onDragOver(e,'B')}
        onDragLeave={()=>onDragLeave('B')}
        onDrop={e=>onDropSlot(e,'B')}>
        <span className="slot-name" style={{fontSize,color:match.teamB?'#fff':'rgba(255,255,255,.2)'}}>
          {match.teamB||(isBye?'부전승':'—')}
        </span>
        {hw===match.teamB&&match.teamB&&<span style={{fontSize:10}}>&#127942;</span>}
        {hw&&match.scoreB!==''&&!match.bye&&<span className="slot-score">{match.scoreB}</span>}
      </div>
    </div>
  );
}

/* ── Result Modal ── */
function ResultModal({match,onConfirm,onBye,onReset,onClose}){
  const [winner,setWinner]=useState(match.winner||null);
  const [scoreA,setScoreA]=useState(match.scoreA||'');
  const [scoreB,setScoreB]=useState(match.scoreB||'');
  const hasA=!!match.teamA, hasB=!!match.teamB;
  const onlyOne=(hasA&&!hasB)||(hasB&&!hasA);
  const confirm=()=>{if(winner) onConfirm({winner,scoreA,scoreB});};

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">경기 결과 입력</div>
        <div className="winner-btns">
          <button className={'winner-btn'+(winner===match.teamA?' selected':'')}
            disabled={!hasA} onClick={()=>hasA&&setWinner(match.teamA)}>
            {match.teamA||'(미배정)'}
          </button>
          <button className={'winner-btn'+(winner===match.teamB?' selected':'')}
            disabled={!hasB} onClick={()=>hasB&&setWinner(match.teamB)}>
            {match.teamB||'(미배정)'}
          </button>
          {onlyOne&&(
            <button className="bye-btn" onClick={onBye}>
              &#127960; 부전승 처리 (자동 진출)
            </button>
          )}
        </div>
        {!onlyOne&&(
          <div className="score-row">
            <input className="score-input" type="number" min="0" value={scoreA}
              onChange={e=>setScoreA(e.target.value)} placeholder="0"/>
            <span className="score-sep">:</span>
            <input className="score-input" type="number" min="0" value={scoreB}
              onChange={e=>setScoreB(e.target.value)} placeholder="0"/>
          </div>
        )}
        <div className="modal-btns">
          {match.winner&&<button className="modal-btn reset" onClick={onReset}>초기화</button>}
          <button className="modal-btn cancel" onClick={onClose}>취소</button>
          {!onlyOne&&(
            <button className="modal-btn confirm" onClick={confirm} disabled={!winner}>확인</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── BracketView ── */
function BracketView({config,matches,setMatches,numRounds}){
  const {teams}=config;
  const nLeaf=1<<(numRounds-1);
  const S=getSizes(nLeaf);
  const dims=bracketDims(numRounds,S);
  const lines=buildLines(matches,numRounds,S);
  const bracketRef=useRef(null);
  const [dragTeam,setDragTeam]=useState(null);
  const [modalMatch,setModalMatch]=useState(null);
  const [overSidebar,setOverSidebar]=useState(false);

  const used=new Set();
  matches.forEach(m=>{if(m.teamA)used.add(m.teamA);if(m.teamB)used.add(m.teamB);});
  const unassigned=teams.filter(t=>!used.has(t));
  const finalM=matches.find(m=>m.round===0&&m.pos===0);
  const champion=finalM&&finalM.winner||null;
  const fcx=matchCX(0,0,numRounds,S);
  const champW=Math.max(120,S.MW+20);

  /* propagate winner up tree */
  function propagate(next,matchId,winner){
    const m=next.find(x=>x.id===matchId);
    if(!m||m.round===0) return;
    const par=next.find(x=>x.round===m.round-1&&x.pos===(m.pos>>1));
    if(!par||par.winner) return;
    if(m.pos%2===0) par.teamA=winner; else par.teamB=winner;
  }
  /* un-propagate: remove winner from parent slot */
  function unpropagate(next,matchId){
    const m=next.find(x=>x.id===matchId);
    if(!m||m.round===0) return;
    const par=next.find(x=>x.round===m.round-1&&x.pos===(m.pos>>1));
    if(!par||par.winner) return;
    if(m.pos%2===0) par.teamA=null; else par.teamB=null;
  }

  const handleSlotDrop=(matchId,slot,dragged)=>{
    setMatches(prev=>{
      const next=prev.map(m=>({...m}));
      const tgt=next.find(m=>m.id===matchId);
      if(!tgt||tgt.winner) return prev;
      const sk=slot==='A'?'teamA':'teamB';
      const evicted=tgt[sk];
      tgt[sk]=dragged.name;
      if(dragged.fromMatchId){
        const src=next.find(m=>m.id===dragged.fromMatchId);
        if(src&&!src.winner){
          const srck=dragged.fromSlot==='A'?'teamA':'teamB';
          src[srck]=evicted||null;
        }
      }
      return next;
    });
    setDragTeam(null);
  };

  const handleSidebarDrop=e=>{
    e.preventDefault();setOverSidebar(false);
    if(!dragTeam||!dragTeam.fromMatchId){setDragTeam(null);return;}
    setMatches(prev=>{
      const next=prev.map(m=>({...m}));
      const src=next.find(m=>m.id===dragTeam.fromMatchId);
      if(src&&!src.winner){
        const k=dragTeam.fromSlot==='A'?'teamA':'teamB';
        src[k]=null;
      }
      return next;
    });
    setDragTeam(null);
  };

  const autoFill=(shuffle)=>{
    let list=[...teams];
    if(shuffle) list=list.sort(()=>Math.random()-.5);
    setMatches(prev=>{
      const next=prev.map(m=>({...m,teamA:null,teamB:null,winner:null,scoreA:'',scoreB:'',bye:false}));
      const leafRound=numRounds-1;
      const leafMs=next.filter(m=>m.round===leafRound).sort((a,b)=>a.pos-b.pos);
      let ti=0;
      leafMs.forEach(lm=>{
        lm.teamA=ti<list.length?list[ti++]:null;
        lm.teamB=ti<list.length?list[ti++]:null;
      });
      return next;
    });
  };

  const clearBracket=()=>{
    setMatches(prev=>prev.map(m=>({...m,teamA:null,teamB:null,winner:null,scoreA:'',scoreB:'',bye:false})));
  };

  const openModal=id=>{
    const m=matches.find(x=>x.id===id);
    if(m) setModalMatch({...m});
  };

  const confirmResult=({winner,scoreA,scoreB})=>{
    setMatches(prev=>{
      const next=prev.map(m=>({...m}));
      const m=next.find(x=>x.id===modalMatch.id);
      if(!m) return prev;
      m.winner=winner;m.scoreA=scoreA;m.scoreB=scoreB;m.bye=false;
      propagate(next,m.id,winner);
      return next;
    });
    setModalMatch(null);
  };

  const byeResult=()=>{
    setMatches(prev=>{
      const next=prev.map(m=>({...m}));
      const m=next.find(x=>x.id===modalMatch.id);
      if(!m) return prev;
      const byeWinner=m.teamA||m.teamB;
      if(!byeWinner) return prev;
      m.winner=byeWinner;m.scoreA='';m.scoreB='';m.bye=true;
      propagate(next,m.id,byeWinner);
      return next;
    });
    setModalMatch(null);
  };

  const resetResult=()=>{
    setMatches(prev=>{
      const next=prev.map(m=>({...m}));
      const m=next.find(x=>x.id===modalMatch.id);
      if(!m) return prev;
      unpropagate(next,m.id);
      m.winner=null;m.scoreA='';m.scoreB='';m.bye=false;
      return next;
    });
    setModalMatch(null);
  };


  return(
    <div className="bk-layout">
      {/* Sidebar */}
      <div className="sidebar"
        onDragOver={e=>{e.preventDefault();setOverSidebar(true);}}
        onDragLeave={()=>setOverSidebar(false)}
        onDrop={handleSidebarDrop}
        style={overSidebar?{background:'rgba(255,226,52,.07)'}:{}}>
        <div className="sidebar-title">미배정 팀 ({unassigned.length}/{teams.length})</div>
        {unassigned.length===0
          ? <div className="sidebar-empty">모든 팀 배정 완료</div>
          : unassigned.map(t=>(
            <div key={t}
              className={'sidebar-team'+(dragTeam&&dragTeam.name===t&&!dragTeam.fromMatchId?' dragging':'')}
              draggable
              onDragStart={e=>{
                setDragTeam({name:t,fromMatchId:null,fromSlot:null});
                e.dataTransfer.effectAllowed='move';
              }}
              onDragEnd={()=>setDragTeam(null)}>
              {t}
            </div>
          ))}
        <div className="sidebar-actions">
          <button className="action-btn primary" onClick={()=>autoFill(false)}>&#9654; 자동 배치</button>
          <button className="action-btn ghost" onClick={()=>autoFill(true)}>&#8635; 섞기 배치</button>
          <button className="action-btn danger" onClick={clearBracket}>&#10005; 초기화</button>
        </div>
      </div>

      {/* Canvas */}
      <div className="bk-canvas-wrap">
        <div ref={bracketRef} className="bk-canvas"
          style={{width:dims.w,height:dims.h,background:'#02153a'}}>
          <svg className="bk-svg" width={dims.w} height={dims.h}>
            {lines.map(l=>(
              <path key={l.key} d={l.d} fill="none"
                stroke={l.isWin?GOLD:'rgba(255,255,255,.15)'}
                strokeWidth={l.isWin?3:1.5}
                strokeLinecap="round" strokeLinejoin="round"/>
            ))}
          </svg>

          {/* Champion slot */}
          <div className="champ-slot"
            style={{position:'absolute',top:S.PY,left:fcx-champW/2,width:champW}}>
            {champion
              ? <div className="champ-box">
                  <div style={{fontSize:16,marginBottom:2}}>&#127942;</div>
                  <div className="champ-name bhs">{champion}</div>
                </div>
              : <div className="champ-empty">&#127942; 우승팀</div>}
          </div>

          {matches.map(m=>(
            <MatchBox key={m.id} match={m} numRounds={numRounds} S={S}
              onDrop={handleSlotDrop}
              onEditClick={()=>openModal(m.id)}
              dragTeam={dragTeam}
              setDragTeam={setDragTeam}/>
          ))}
        </div>
      </div>

      {modalMatch&&(
        <ResultModal match={modalMatch}
          onConfirm={confirmResult}
          onBye={byeResult}
          onReset={resetResult}
          onClose={()=>setModalMatch(null)}/>
      )}
    </div>
  );
}

/* ── Setup Screen ── */
function SetupScreen({onStart}){
  const [count,setCount]=useState(8);
  const [names,setNames]=useState(()=>Array.from({length:8},(_,i)=>`${i+1}팀`));

  const changeCount=n=>{
    const nc=Math.max(4,Math.min(64,isNaN(n)?count:n));
    setCount(nc);
    setNames(prev=>Array.from({length:nc},(_,i)=>i<prev.length?prev[i]:`${i+1}팀`));
  };
  const setName=(i,v)=>setNames(ns=>ns.map((x,j)=>j===i?v:x));

  const bSize=nextPow2(count);
  const byes=bSize-count;

  const start=()=>onStart({teams:names.map((n,i)=>n.trim()||`${i+1}팀`)});

  return(
    <div className="setup-wrap">
      <div className="setup-card">
        <div className="setup-title bhs">참가 팀 수</div>
        <div className="count-row">
          <button className="count-btn" onClick={()=>changeCount(count-1)}>&#8722;</button>
          <input className="count-inp" type="number" min="4" max="64" value={count}
            onChange={e=>changeCount(parseInt(e.target.value,10))}/>
          <button className="count-btn" onClick={()=>changeCount(count+1)}>&#43;</button>
        </div>
        <div className="bracket-hint">
          &#9654; 브라켓: {bSize}강 &nbsp;|&nbsp; 부전승: {byes}팀
          {byes>0&&' (일부 팀이 자동 진출합니다)'}
        </div>
        <div className="setup-title bhs">팀 이름</div>
        <div className="team-grid">
          {names.map((name,i)=>(
            <div key={i} className="team-input-wrap">
              <div className="team-num">{i+1}</div>
              <input className="team-input" value={name}
                onChange={e=>setName(i,e.target.value)}
                placeholder={`${i+1}팀`}/>
            </div>
          ))}
        </div>
        <button className="start-btn bhs" onClick={start}>대진표 만들기 &#8594;</button>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const [screen,setScreen]=useState('setup');
  const [config,setConfig]=useState(null);
  const [matches,setMatches]=useState([]);
  const [numRounds,setNumRounds]=useState(0);

  const handleStart=cfg=>{
    const {matches:ms,numRounds:nr}=initMatches(cfg.teams.length);
    setConfig(cfg);
    setMatches(ms);
    setNumRounds(nr);
    setScreen('bracket');
  };

  return(
    <>
      <BgDecor/>
      <Header onBack={screen==='bracket'?()=>setScreen('setup'):null}/>
      {screen==='setup'&&<SetupScreen onStart={handleStart}/>}
      {screen==='bracket'&&config&&(
        <BracketView config={config} matches={matches}
          setMatches={setMatches} numRounds={numRounds}/>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
