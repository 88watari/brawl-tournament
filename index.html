<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>브롤스타즈 본선 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0248BB;font-family:'Noto Sans KR',sans-serif;min-height:100vh;color:#fff}
.bhs{font-family:'Black Han Sans',sans-serif}
button{cursor:pointer;border:none;outline:none}
input{outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
::-webkit-scrollbar-thumb{background:#FFE234;border-radius:3px}
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,28,70,.95);border-bottom:2px solid #FFE234;padding:10px 20px;display:flex;align-items:center;gap:12px;min-height:50px}
.hdr-title{font-size:19px;color:#FFE234;letter-spacing:1px}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.5)}
/* Setup */
.setup-wrap{max-width:720px;margin:0 auto;padding:28px 20px}
.setup-card{background:rgba(0,0,0,.32);border-radius:16px;padding:26px;border:1px solid rgba(255,226,52,.15)}
.setup-ttl{font-size:15px;color:#FFE234;margin-bottom:12px}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:22px;max-height:380px;overflow-y:auto;padding-right:4px}
.tiwrap{display:flex;align-items:center;gap:6px}
.tinum{width:24px;height:24px;border-radius:50%;background:#0248BB;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#FFE234;flex-shrink:0}
.tiinp{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:7px;padding:6px 9px;color:#fff;font-size:13px}
.tiinp:focus{border-color:#FFE234}
.tiinp::placeholder{color:rgba(255,255,255,.25)}
.start-btn{width:100%;padding:13px;border-radius:11px;background:#FFE234;color:#0248BB;font-size:16px;font-weight:700;transition:.15s}
.start-btn:hover{background:#fff}
/* Tournament layout */
.tn-wrap{display:flex;height:calc(100vh - 50px)}
/* Sidebar */
.sb{width:180px;flex-shrink:0;background:rgba(0,0,0,.45);border-right:1px solid rgba(255,226,52,.12);padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.sb-ttl{font-size:10px;color:#FFE234;font-weight:700;padding-bottom:5px;border-bottom:1px solid rgba(255,226,52,.13);margin-bottom:2px}
.sb-team{padding:5px 9px;border-radius:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:12px;cursor:grab;user-select:none;display:flex;align-items:center;gap:5px;transition:.1s}
.sb-team::before{content:'\2807';color:rgba(255,255,255,.27);font-size:12px;flex-shrink:0}
.sb-team:hover{background:rgba(255,226,52,.13);border-color:#FFE234}
.sb-team:hover::before{color:#FFE234}
.sb-team.drag-src{opacity:.3}
.sb-empty{font-size:10px;color:rgba(255,255,255,.27);text-align:center;padding:6px 0}
.bye-section{margin-top:4px}
.bye-slot{padding:5px 8px;border-radius:6px;border:1px dashed rgba(100,160,255,.28);font-size:11px;min-height:30px;display:flex;align-items:center;justify-content:space-between;transition:.1s;background:rgba(255,255,255,.02);margin-bottom:4px}
.bye-slot.filled{background:rgba(100,160,255,.07);border-color:rgba(100,160,255,.45);cursor:grab}
.bye-slot.drag-over{background:rgba(255,226,52,.12) !important;border-color:#FFE234 !important}
.bye-slot-name{font-size:11px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rmv-btn{background:none;color:rgba(255,100,100,.65);font-size:15px;font-weight:700;padding:0 2px;line-height:1;flex-shrink:0;transition:.1s}
.rmv-btn:hover{color:#ff6060}
/* Stage picker in sidebar */
.stage-picker{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.spick{padding:4px 8px;border-radius:5px;font-size:10px;font-weight:700;background:rgba(255,255,255,.06);color:rgba(255,255,255,.45);border:1px solid transparent;transition:.1s}
.spick.active{background:rgba(255,226,52,.15);color:#FFE234;border-color:rgba(255,226,52,.35)}
.spick.done{color:rgba(120,210,120,.75)}
.spick:hover:not(.active){background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
/* Sidebar actions */
.sb-actions{margin-top:auto;display:flex;flex-direction:column;gap:5px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)}
.sb-btn{width:100%;padding:7px;border-radius:6px;font-size:11px;font-weight:700;transition:.1s}
.sb-btn.prim{background:#FFE234;color:#0248BB}
.sb-btn.prim:hover{background:#fff}
.sb-btn.ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.1)}
.sb-btn.ghost:hover{background:rgba(255,255,255,.13)}
.sb-btn.danger{background:rgba(255,50,50,.08);color:#ff9090;border:1px solid rgba(255,50,50,.18)}
.sb-btn.danger:hover{background:rgba(255,50,50,.15)}
.pj-info{font-size:10px;color:rgba(255,226,52,.7);padding:5px 8px;background:rgba(255,226,52,.05);border-radius:5px}
/* Canvas wrapper */
.bk-scroll{flex:1;overflow:auto;padding:16px}
/* Match box */
.mcard{position:absolute;border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,.12);background:rgba(5,15,45,.82);transition:border-color .1s}
.mcard.has-result{border-color:rgba(255,226,52,.25)}
.mcard-hdr{display:flex;align-items:center;justify-content:space-between;padding:3px 6px;background:rgba(0,0,0,.22);border-bottom:1px solid rgba(255,255,255,.04)}
.mcard-lbl{font-size:9px;color:rgba(255,255,255,.32)}
.medit-btn{background:none;color:rgba(255,255,255,.3);font-size:10px;padding:2px 4px;border-radius:3px;transition:.1s}
.medit-btn:hover{background:rgba(255,226,52,.14);color:#FFE234}
.mslot{display:flex;align-items:center;padding:4px 6px;min-height:30px;gap:4px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s}
.mslot:last-child{border-bottom:none}
.mslot.empty{background:rgba(255,255,255,.01)}
.mslot.win{background:rgba(255,226,52,.09)}
.mslot.lose{opacity:.3}
.mslot.dov{background:rgba(255,226,52,.18) !important;outline:1px solid #FFE234}
.slot-name{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-empty-hint{flex:1;font-size:9px;color:rgba(255,255,255,.16)}
.slot-score{font-size:9px;font-weight:700;color:#FFE234;min-width:12px;text-align:right}
/* Champion */
.champ-box{background:linear-gradient(135deg,#ffd000,#ff8c00);border-radius:10px;padding:10px 20px;display:inline-block;box-shadow:0 0 24px rgba(255,208,0,.4)}
.champ-lbl{font-size:10px;color:rgba(0,0,0,.42);margin-bottom:2px}
.champ-name{font-size:17px;font-weight:700;color:#3a1a00}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-card{background:#0a1c46;border:1px solid rgba(255,226,52,.28);border-radius:13px;padding:20px;min-width:290px;max-width:365px;width:90%}
.modal-ttl{font-size:14px;color:#FFE234;margin-bottom:14px;text-align:center}
.wbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.wbtn{padding:10px 5px;border-radius:7px;font-size:12px;font-weight:700;background:rgba(255,255,255,.07);color:#fff;border:2px solid rgba(255,255,255,.12);transition:.15s;word-break:break-all;text-align:center}
.wbtn:hover:not(:disabled){border-color:#FFE234;background:rgba(255,226,52,.1)}
.wbtn.sel{background:#FFE234;color:#0248BB;border-color:#FFE234}
.wbtn:disabled{opacity:.27;cursor:default}
.bye-btn-m{grid-column:1/-1;padding:9px;border-radius:7px;font-size:12px;font-weight:700;background:rgba(255,255,255,.06);color:rgba(255,255,255,.52);border:1px dashed rgba(255,255,255,.2);transition:.15s}
.bye-btn-m:hover{background:rgba(255,255,255,.12);color:#fff}
.score-row{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:12px}
.sinp{width:52px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px;text-align:center;font-size:17px;font-weight:700;color:#fff}
.ssep{font-size:17px;font-weight:700;color:rgba(255,255,255,.36)}
.mbtns{display:flex;gap:7px}
.mbtn{flex:1;padding:9px;border-radius:7px;font-size:12px;font-weight:700;transition:.15s}
.mbtn.conf{background:#FFE234;color:#0248BB}
.mbtn.conf:hover:not(:disabled){background:#fff}
.mbtn.conf:disabled{opacity:.36;cursor:default}
.mbtn.cancel{background:rgba(255,255,255,.07);color:rgba(255,255,255,.48)}
.mbtn.cancel:hover{background:rgba(255,255,255,.12)}
.mbtn.reset{background:rgba(255,50,50,.07);color:#ff9090;border:1px solid rgba(255,50,50,.18)}
.mbtn.reset:hover{background:rgba(255,50,50,.14)}
.pj-btn{display:block;width:100%;padding:9px 12px;border-radius:7px;font-size:13px;font-weight:700;background:rgba(255,255,255,.06);color:#fff;border:2px solid rgba(255,255,255,.1);text-align:left;transition:.15s;margin-bottom:6px}
.pj-btn.sel{background:rgba(255,226,52,.13);border-color:#FFE234;color:#FFE234}
.pj-btn:hover:not(.sel){background:rgba(255,255,255,.1)}
/* Legend */
.legend{position:absolute;top:6px;right:10px;display:flex;gap:10px;font-size:9px;color:rgba(255,255,255,.4)}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-line{width:18px;height:2px;border-radius:1px}
@keyframes diagonalScroll{0%{background-position:0 0}100%{background-position:130px 130px}}
</style>
</head>

const GOLD = '#FFE234';
const LOSER_CLR = 'rgba(80,160,255,0.55)';
const TEAM_COUNT = 20;

const STAGE_DEFS = [
  {id:'s16',label:'16강',matchCount:8,byeCount:4,note:'4팀 부전승 포함 · 12팀 12강 진출'},
  {id:'s12',label:'12강',matchCount:6,byeCount:0,note:'승자→8강 · 패자→패자전'},
  {id:'spj',label:'패자전',matchCount:3,byeCount:0,note:'승자 중 2팀 선택'},
  {id:'s8', label:'8강', matchCount:4,byeCount:0,note:''},
  {id:'s4', label:'4강', matchCount:2,byeCount:0,note:''},
  {id:'sf', label:'결승',matchCount:1,byeCount:0,note:''},
];

/* ─── Layout ─── */
// Row 0=top=결승, Row 5=bottom=16강
const BL = {MW:140,MH:72,HDR:16,GX:18,GY:56,PX:76,PY:16,CH:40,CG:12,NCOLS:8};
const BROW  = {sf:0,s4:1,s8:2,spj:3,s12:4,s16:5};
const BCOFF = {sf:3.5,s4:3,s8:2,spj:5,s12:1,s16:0};

function bCX(sid,pos){return BL.PX+(BCOFF[sid]+pos)*(BL.MW+BL.GX)+BL.MW/2;}
function bTY(sid){return BL.PY+BL.CH+BL.CG+BROW[sid]*(BL.MH+BL.GY);}
function bDims(){
  const cW=BL.MW+BL.GX;
  const rightX=BL.PX+(BL.NCOLS-1)*cW+BL.MW+24;
  const h=BL.PY+BL.CH+BL.CG+6*(BL.MH+BL.GY)-BL.GY+BL.PY;
  return{w:Math.max(1000,rightX),h};
}

/* ─── Data ─── */
function mkMatch(sid,pos){
  return{id:`${sid}_m${pos}`,stageId:sid,pos,teamA:null,teamB:null,winner:null,loser:null,scoreA:'',scoreB:'',bye:false};
}
function initStages(){
  return STAGE_DEFS.map(def=>({
    ...def,
    byeTeams:Array.from({length:def.byeCount||0},()=>null),
    matches:Array.from({length:def.matchCount},(_,i)=>mkMatch(def.id,i))
  }));
}
function getAvail(idx,stages,allTeams,pjSel){
  const s=stages[idx];
  const used=new Set();
  s.matches.forEach(m=>{if(m.teamA)used.add(m.teamA);if(m.teamB)used.add(m.teamB);});
  let pool=[];
  if(idx===0){s.byeTeams.forEach(t=>{if(t)used.add(t);});pool=allTeams;}
  else if(idx===1){const s0=stages[0];pool=[...s0.byeTeams.filter(Boolean),...s0.matches.map(m=>m.winner).filter(Boolean)];}
  else if(idx===2){pool=stages[1].matches.map(m=>m.loser).filter(Boolean);}
  else if(idx===3){pool=[...stages[1].matches.map(m=>m.winner).filter(Boolean),...(pjSel||[])];}
  else if(idx===4){pool=stages[3].matches.map(m=>m.winner).filter(Boolean);}
  else if(idx===5){pool=stages[4].matches.map(m=>m.winner).filter(Boolean);}
  return pool.filter(t=>!used.has(t));
}
function isDone(stage){return stage.matches.every(m=>m.winner);}

/* ─── Lines ─── */
function buildLines(stages,pjSel){
  const lines=[];
  const sm={};stages.forEach(s=>sm[s.id]=s);
  function findM(sid,team){
    if(!team)return null;
    return(sm[sid]?.matches||[]).find(m=>m.teamA===team||m.teamB===team)||null;
  }
  function addLine(key,fs,fp,ts,tp,win){
    const fcx=bCX(fs,fp), fty=bTY(fs);
    const tcx=bCX(ts,tp), tby=bTY(ts)+BL.MH;
    const mid=(fty+tby)/2;
    lines.push({key,d:`M ${fcx} ${fty} L ${fcx} ${mid} L ${tcx} ${mid} L ${tcx} ${tby}`,win});
  }
  sm['s16'].matches.forEach(m=>{
    if(m.winner){const d=findM('s12',m.winner);if(d)addLine(`16w${m.pos}`,'s16',m.pos,'s12',d.pos,true);}
  });
  sm['s12'].matches.forEach(m=>{
    if(m.winner){const d=findM('s8',m.winner);if(d)addLine(`12w${m.pos}`,'s12',m.pos,'s8',d.pos,true);}
    if(m.loser){const d=findM('spj',m.loser);if(d)addLine(`12l${m.pos}`,'s12',m.pos,'spj',d.pos,false);}
  });
  sm['spj'].matches.forEach(m=>{
    if(m.winner&&pjSel.includes(m.winner)){const d=findM('s8',m.winner);if(d)addLine(`pjw${m.pos}`,'spj',m.pos,'s8',d.pos,true);}
  });
  sm['s8'].matches.forEach(m=>{
    if(m.winner){const d=findM('s4',m.winner);if(d)addLine(`8w${m.pos}`,'s8',m.pos,'s4',d.pos,true);}
  });
  sm['s4'].matches.forEach(m=>{
    if(m.winner){const d=findM('sf',m.winner);if(d)addLine(`4w${m.pos}`,'s4',m.pos,'sf',d.pos,true);}
  });
  const sfm=sm['sf'].matches[0];
  if(sfm?.winner){
    const fcx=bCX('sf',0),fty=bTY('sf');
    lines.push({key:'champ',d:`M ${fcx} ${fty} L ${fcx} ${BL.PY+BL.CH}`,win:true});
  }
  return lines;
}

/* ─── BgDecor ─── */
function BgDecor(){
  const url='url("data:image/png;base64,'+SKULL_B64+'")';
  return(
    <div style={{position:'fixed',inset:0,zIndex:-1,pointerEvents:'none'}}>
      <div style={{position:'absolute',inset:0,background:'#0248BB'}}/>
      <div style={{position:'absolute',inset:0,backgroundImage:url,backgroundRepeat:'repeat',backgroundSize:'65px 65px',opacity:.08,animation:'diagonalScroll 8s linear infinite'}}/>
    </div>
  );
}
function Header({onBack}){
  return(
    <div className="hdr">
      {onBack&&<button onClick={onBack} style={{background:'none',color:'#FFE234',fontSize:18,padding:'0 5px'}}>&#8592;</button>}
      <span className="bhs hdr-title">BRAWL STARS 본선</span>
      <span className="hdr-sub">2026</span>
    </div>
  );
}

/* ─── Setup ─── */
function SetupScreen({onStart}){
  const [names,setNames]=useState(()=>Array.from({length:TEAM_COUNT},(_,i)=>`${i+1}팀`));
  const setN=(i,v)=>setNames(ns=>ns.map((x,j)=>j===i?v:x));
  return(
    <div className="setup-wrap">
      <div className="setup-card">
        <div className="setup-ttl bhs">팀 이름 등록 <span style={{fontSize:12,color:'rgba(255,255,255,.33)',fontFamily:'Noto Sans KR'}}>(20팀 고정)</span></div>
        <div className="team-grid">
          {names.map((n,i)=>(
            <div key={i} className="tiwrap">
              <div className="tinum">{i+1}</div>
              <input className="tiinp" value={n} onChange={e=>setN(i,e.target.value)} placeholder={`${i+1}팀`}/>
            </div>
          ))}
        </div>
        <button className="start-btn bhs" onClick={()=>onStart(names.map((n,i)=>n.trim()||`${i+1}팀`))}>
          토너먼트 시작 &#8594;
        </button>
      </div>
    </div>
  );
}

/* ─── Modals ─── */
function ResultModal({match,onConfirm,onBye,onReset,onClose}){
  const [winner,setWinner]=useState(match.winner||null);
  const [sA,setSA]=useState(match.scoreA||'');
  const [sB,setSB]=useState(match.scoreB||'');
  const hasA=!!match.teamA,hasB=!!match.teamB;
  const onlyOne=(hasA&&!hasB)||(hasB&&!hasA);
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()}>
        <div className="modal-ttl">경기 결과 입력</div>
        <div className="wbtns">
          <button className={'wbtn'+(winner===match.teamA?' sel':'')} disabled={!hasA} onClick={()=>hasA&&setWinner(match.teamA)}>{match.teamA||'(미배정)'}</button>
          <button className={'wbtn'+(winner===match.teamB?' sel':'')} disabled={!hasB} onClick={()=>hasB&&setWinner(match.teamB)}>{match.teamB||'(미배정)'}</button>
          {onlyOne&&<button className="bye-btn-m" onClick={onBye}>&#127960; 부전승 처리</button>}
        </div>
        {!onlyOne&&(
          <div className="score-row">
            <input className="sinp" type="number" min="0" value={sA} onChange={e=>setSA(e.target.value)} placeholder="0"/>
            <span className="ssep">:</span>
            <input className="sinp" type="number" min="0" value={sB} onChange={e=>setSB(e.target.value)} placeholder="0"/>
          </div>
        )}
        <div className="mbtns">
          {match.winner&&<button className="mbtn reset" onClick={onReset}>초기화</button>}
          <button className="mbtn cancel" onClick={onClose}>취소</button>
          {!onlyOne&&<button className="mbtn conf" disabled={!winner} onClick={()=>winner&&onConfirm({winner,scoreA:sA,scoreB:sB})}>확인</button>}
        </div>
      </div>
    </div>
  );
}
function PJModal({winners,selected,onToggle,onConfirm,onClose}){
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()}>
        <div className="modal-ttl">8강 진출팀 선택</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.43)',marginBottom:12,textAlign:'center'}}>패자전 승자 3팀 중 <b style={{color:GOLD}}>2팀</b> 선택</div>
        {winners.map(t=>(
          <button key={t} className={'pj-btn'+(selected.includes(t)?' sel':'')} onClick={()=>onToggle(t)}>
            {selected.includes(t)?'✓ ':''}{t}
          </button>
        ))}
        <div className="mbtns" style={{marginTop:4}}>
          <button className="mbtn cancel" onClick={onClose}>취소</button>
          <button className="mbtn conf" disabled={selected.length!==2} onClick={onConfirm}>확인 ({selected.length}/2)</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Bye Slot ─── */
function ByeSlot({team,byeIdx,onDrop,onRemove,dragTeam,setDragTeam}){
  const [ov,setOv]=useState(false);
  return(
    <div className={'bye-slot'+(team?' filled':'')+(ov?' drag-over':'')}
      draggable={!!team}
      onDragStart={e=>{if(!team)return e.preventDefault();setDragTeam({name:team,fromBye:byeIdx});e.dataTransfer.effectAllowed='move';e.stopPropagation();}}
      onDragEnd={()=>setDragTeam(null)}
      onDragOver={e=>{e.preventDefault();setOv(true);}}
      onDragLeave={()=>setOv(false)}
      onDrop={e=>{e.preventDefault();setOv(false);if(dragTeam)onDrop(byeIdx,dragTeam);}}>
      {team?(<><span className="bye-slot-name">{team}</span><button className="rmv-btn" onClick={e=>{e.stopPropagation();onRemove(byeIdx);}}>&#8722;</button></>)
        :<span style={{fontSize:9,color:'rgba(255,255,255,.2)'}}>여기에 드래그</span>}
    </div>
  );
}

/* ─── Match Box (absolute positioned) ─── */
function MatchBox({match,onDrop,onEdit,onRemove,dragTeam,setDragTeam}){
  const [ovA,setOvA]=useState(false);
  const [ovB,setOvB]=useState(false);
  const hw=match.winner;
  const cx=bCX(match.stageId,match.pos);
  const ty=bTY(match.stageId);
  const slotH=(BL.MH-BL.HDR)/2;

  const startDrag=(e,slot)=>{
    const name=slot==='A'?match.teamA:match.teamB;
    if(!name||hw)return e.preventDefault();
    setDragTeam({name,fromMatchId:match.id,fromSlot:slot});
    e.dataTransfer.effectAllowed='move';e.stopPropagation();
  };
  const onDO=(e,s)=>{e.preventDefault();s==='A'?setOvA(true):setOvB(true);};
  const onDL=(s)=>{s==='A'?setOvA(false):setOvB(false);};
  const onDS=(e,slot)=>{
    e.preventDefault();setOvA(false);setOvB(false);
    if(!dragTeam)return;
    onDrop(match.id,slot,dragTeam);
  };
  const sc=(team,isWin,ov)=>{
    let c='mslot';
    if(!team)c+=' empty';
    else if(hw)c+=hw===team?' win':' lose';
    if(ov)c+=' dov';
    return c;
  };

  return(
    <div className={'mcard'+(hw?' has-result':'')}
      style={{left:cx-BL.MW/2,top:ty,width:BL.MW,height:BL.MH}}>
      <div className="mcard-hdr" style={{height:BL.HDR}}>
        <span className="mcard-lbl">M{match.pos+1}</span>
        <button className="medit-btn" onClick={()=>onEdit(match)}>&#9998;</button>
      </div>
      <div className={sc(match.teamA,hw===match.teamA,ovA)} style={{height:slotH,borderBottom:'1px solid rgba(255,255,255,.04)'}}
        draggable={!!(match.teamA&&!hw)}
        onDragStart={e=>startDrag(e,'A')} onDragOver={e=>onDO(e,'A')} onDragLeave={()=>onDL('A')} onDrop={e=>onDS(e,'A')}>
        {match.teamA?(<>
          {hw===match.teamA&&<span style={{fontSize:9,flexShrink:0}}>&#127942;</span>}
          <span className="slot-name">{match.teamA}</span>
          {hw&&match.scoreA!==''&&!match.bye&&<span className="slot-score">{match.scoreA}</span>}
          {!hw&&<button className="rmv-btn" onClick={e=>{e.stopPropagation();onRemove(match.id,'A');}}>&#8722;</button>}
        </>):<span className="slot-empty-hint">드래그</span>}
      </div>
      <div className={sc(match.teamB,hw===match.teamB,ovB)} style={{height:slotH}}
        draggable={!!(match.teamB&&!hw)}
        onDragStart={e=>startDrag(e,'B')} onDragOver={e=>onDO(e,'B')} onDragLeave={()=>onDL('B')} onDrop={e=>onDS(e,'B')}>
        {match.teamB?(<>
          {hw===match.teamB&&<span style={{fontSize:9,flexShrink:0}}>&#127942;</span>}
          <span className="slot-name">{match.teamB}</span>
          {hw&&match.scoreB!==''&&!match.bye&&<span className="slot-score">{match.scoreB}</span>}
          {!hw&&<button className="rmv-btn" onClick={e=>{e.stopPropagation();onRemove(match.id,'B');}}>&#8722;</button>}
        </>):<span className="slot-empty-hint">드래그</span>}
      </div>
    </div>
  );
}

/* ─── Tournament View ─── */
function TournamentView({teams}){
  const [stages,setStages]=useState(initStages);
  const [activeIdx,setActiveIdx]=useState(0);
  const [dragTeam,setDragTeam]=useState(null);
  const [modal,setModal]=useState(null);
  const [pjSel,setPjSel]=useState([]);
  const [showPJ,setShowPJ]=useState(false);
  const [ovSb,setOvSb]=useState(false);

  const upd=fn=>setStages(prev=>{
    const next=prev.map(s=>({...s,byeTeams:[...s.byeTeams],matches:s.matches.map(m=>({...m}))}));
    fn(next);return next;
  });

  const onMatchDrop=(matchId,slot,dragged)=>{
    upd(next=>{
      // find which stage the match belongs to
      let tgt=null,tgtStage=null;
      for(const s of next){const m=s.matches.find(x=>x.id===matchId);if(m){tgt=m;tgtStage=s;break;}}
      if(!tgt||tgt.winner)return;
      const k=slot==='A'?'teamA':'teamB';
      const evicted=tgt[k];
      tgt[k]=dragged.name;
      // clear source
      if(dragged.fromMatchId){
        for(const s of next){const src=s.matches.find(x=>x.id===dragged.fromMatchId);if(src&&!src.winner){const sk=dragged.fromSlot==='A'?'teamA':'teamB';src[sk]=evicted||null;break;}}
      }else if(dragged.fromBye!=null){
        next[0].byeTeams[dragged.fromBye]=evicted||null;
      }
    });
    setDragTeam(null);
  };

  const onByeDrop=(byeIdx,dragged)=>{
    upd(next=>{
      const evicted=next[0].byeTeams[byeIdx];
      next[0].byeTeams[byeIdx]=dragged.name;
      if(dragged.fromMatchId){
        for(const s of next){const src=s.matches.find(x=>x.id===dragged.fromMatchId);if(src&&!src.winner){const sk=dragged.fromSlot==='A'?'teamA':'teamB';src[sk]=evicted||null;break;}}
      }else if(dragged.fromBye!=null&&dragged.fromBye!==byeIdx){
        next[0].byeTeams[dragged.fromBye]=evicted||null;
      }
    });
    setDragTeam(null);
  };

  const onSbDrop=e=>{
    e.preventDefault();setOvSb(false);
    if(!dragTeam)return;
    upd(next=>{
      if(dragTeam.fromMatchId){
        for(const s of next){const src=s.matches.find(x=>x.id===dragTeam.fromMatchId);if(src&&!src.winner){const k=dragTeam.fromSlot==='A'?'teamA':'teamB';src[k]=null;break;}}
      }else if(dragTeam.fromBye!=null){
        next[0].byeTeams[dragTeam.fromBye]=null;
      }
    });
    setDragTeam(null);
  };

  const removeSlot=(matchId,slot)=>upd(next=>{
    for(const s of next){const m=s.matches.find(x=>x.id===matchId);if(m){if(!m.winner){if(slot==='A')m.teamA=null;else m.teamB=null;}break;}}
  });
  const removeBye=i=>upd(next=>{next[0].byeTeams[i]=null;});

  const autoFill=(shuffle)=>{
    let list=[...getAvail(activeIdx,stages,teams,pjSel)];
    if(shuffle)list=list.sort(()=>Math.random()-.5);
    upd(next=>{
      const s=next[activeIdx];let ti=0;
      if(activeIdx===0)s.byeTeams.forEach((_,i)=>{if(!s.byeTeams[i]&&ti<list.length)s.byeTeams[i]=list[ti++];});
      s.matches.forEach(m=>{if(!m.winner){if(!m.teamA&&ti<list.length)m.teamA=list[ti++];if(!m.teamB&&ti<list.length)m.teamB=list[ti++];}});
    });
  };

  const clearStage=()=>upd(next=>{
    const s=next[activeIdx];
    s.byeTeams=s.byeTeams.map(()=>null);
    s.matches=s.matches.map(m=>({...m,teamA:null,teamB:null,winner:null,loser:null,scoreA:'',scoreB:'',bye:false}));
  });

  const confirmResult=({winner,scoreA,scoreB})=>{
    upd(next=>{
      for(const s of next){const m=s.matches.find(x=>x.id===modal.id);if(m){m.winner=winner;m.loser=winner===m.teamA?m.teamB:m.teamA;m.scoreA=scoreA;m.scoreB=scoreB;m.bye=false;break;}}
    });
    setModal(null);
  };
  const byeResult=()=>{
    upd(next=>{
      for(const s of next){const m=s.matches.find(x=>x.id===modal.id);if(m){const bw=m.teamA||m.teamB;m.winner=bw;m.loser=null;m.scoreA='';m.scoreB='';m.bye=true;break;}}
    });
    setModal(null);
  };
  const resetResult=()=>{
    upd(next=>{
      for(const s of next){const m=s.matches.find(x=>x.id===modal.id);if(m){m.winner=null;m.loser=null;m.scoreA='';m.scoreB='';m.bye=false;break;}}
    });
    setModal(null);
  };

  const togglePJ=t=>setPjSel(prev=>prev.includes(t)?prev.filter(x=>x!==t):prev.length<2?[...prev,t]:prev);

  const available=getAvail(activeIdx,stages,teams,pjSel);
  const pjWinners=stages[2].matches.map(m=>m.winner).filter(Boolean);
  const champion=stages[5].matches[0]?.winner||null;
  const lines=buildLines(stages,pjSel);
  const dims=bDims();
  const sfcx=bCX('sf',0);
  const champW=Math.max(140,BL.MW+20);

  const poolLabels=['미배정 (20팀)','12강 대기 (12)','패자전 대기 (6)','8강 대기 (8)','4강 대기 (4)','결승 대기 (2)'];

  return(
    <div className="tn-wrap">
      {/* Sidebar */}
      <div className="sb"
        onDragOver={e=>{e.preventDefault();setOvSb(true);}}
        onDragLeave={()=>setOvSb(false)}
        onDrop={onSbDrop}
        style={ovSb?{background:'rgba(255,226,52,.05)'}:{}}>

        {/* Stage picker */}
        <div className="sb-ttl">스테이지 선택</div>
        <div className="stage-picker">
          {STAGE_DEFS.map((def,i)=>(
            <button key={def.id}
              className={'spick'+(i===activeIdx?' active':'')+(isDone(stages[i])&&i!==activeIdx?' done':'')}
              onClick={()=>setActiveIdx(i)}>
              {isDone(stages[i])&&i!==activeIdx?'✓':'⚫'} {def.label}
            </button>
          ))}
        </div>

        {/* Available teams */}
        <div className="sb-ttl" style={{marginTop:8}}>{poolLabels[activeIdx]} → {available.length}미배정</div>
        {available.length===0
          ?<div className="sb-empty">모두 배정됨</div>
          :available.map(t=>(
            <div key={t}
              className={'sb-team'+(dragTeam?.name===t&&dragTeam?.fromBye==null&&!dragTeam?.fromMatchId?' drag-src':'')}
              draggable
              onDragStart={e=>{setDragTeam({name:t});e.dataTransfer.effectAllowed='move';}}
              onDragEnd={()=>setDragTeam(null)}>
              {t}
            </div>
          ))}

        {/* Bye slots for 16강 */}
        {activeIdx===0&&(
          <div className="bye-section">
            <div className="sb-ttl" style={{marginTop:8}}>부전승 (4팀)</div>
            {stages[0].byeTeams.map((t,i)=>(
              <ByeSlot key={i} team={t} byeIdx={i} onDrop={onByeDrop} onRemove={removeBye} dragTeam={dragTeam} setDragTeam={setDragTeam}/>
            ))}
          </div>
        )}

        {/* PJ select */}
        {activeIdx===2&&isDone(stages[2])&&(
          <div style={{marginTop:6}}>
            {pjSel.length===2
              ?<div className="pj-info">선택완료: {pjSel.join(', ')}</div>
              :<button className="sb-btn prim" onClick={()=>setShowPJ(true)}>&#127942; 8강 진출팀 선택</button>}
          </div>
        )}
        {activeIdx===3&&pjSel.length===2&&(
          <div className="pj-info" style={{marginTop:4}}>패자전: {pjSel.join(' / ')}</div>
        )}

        <div className="sb-actions">
          <button className="sb-btn prim" onClick={()=>autoFill(false)}>&#9654; 자동 배치</button>
          <button className="sb-btn ghost" onClick={()=>autoFill(true)}>&#8635; 섞기</button>
          <button className="sb-btn danger" onClick={clearStage}>&#10005; 초기화</button>
        </div>
      </div>

      {/* Bracket canvas */}
      <div className="bk-scroll">
        <div style={{position:'relative',width:dims.w,height:dims.h,background:'#02153a',margin:'0 auto'}}>

          {/* SVG: lines + stage labels */}
          <svg style={{position:'absolute',top:0,left:0,pointerEvents:'none'}} width={dims.w} height={dims.h}>
            {/* Stage labels on left */}
            {STAGE_DEFS.map(def=>(
              <g key={def.id}>
                <text x={BL.PX-8} y={bTY(def.id)+BL.MH/2+4}
                  textAnchor="end" fill="rgba(255,226,52,0.55)" fontSize="11" fontFamily="Noto Sans KR,sans-serif" fontWeight="700">
                  {def.label}
                </text>
              </g>
            ))}
            {/* Connection lines */}
            {lines.map(l=>(
              <path key={l.key} d={l.d} fill="none"
                stroke={l.win?GOLD:LOSER_CLR}
                strokeWidth={l.win?2.5:1.5}
                strokeLinecap="round" strokeLinejoin="round"
                strokeDasharray={l.win?'none':'4 3'}/>
            ))}
            {/* Legend */}
            <g transform={`translate(${dims.w-180},8)`}>
              <line x1="0" y1="7" x2="20" y2="7" stroke={GOLD} strokeWidth="2.5" strokeLinecap="round"/>
              <text x="24" y="11" fill="rgba(255,255,255,.4)" fontSize="9" fontFamily="Noto Sans KR">승자 진출</text>
              <line x1="0" y1="22" x2="20" y2="22" stroke={LOSER_CLR} strokeWidth="1.5" strokeLinecap="round" strokeDasharray="4 3"/>
              <text x="24" y="26" fill="rgba(255,255,255,.4)" fontSize="9" fontFamily="Noto Sans KR">패자→패자전</text>
            </g>
          </svg>

          {/* Champion box */}
          <div style={{position:'absolute',top:BL.PY,left:sfcx-champW/2,width:champW,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {champion
              ?<div className="champ-box"><div className="champ-lbl">&#127942; 2026 본선 우승</div><div className="champ-name bhs">{champion}</div></div>
              :<div style={{height:BL.CH,width:champW,border:'2px dashed rgba(255,208,0,.28)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'rgba(255,208,0,.35)'}}>&#127942; 우승팀</div>}
          </div>

          {/* All match boxes */}
          {stages.map(stage=>
            stage.matches.map(m=>(
              <MatchBox key={m.id} match={m}
                onDrop={onMatchDrop}
                onEdit={()=>setModal({...m})}
                onRemove={removeSlot}
                dragTeam={dragTeam} setDragTeam={setDragTeam}/>
            ))
          )}
        </div>
      </div>

      {modal&&<ResultModal match={modal} onConfirm={confirmResult} onBye={byeResult} onReset={resetResult} onClose={()=>setModal(null)}/>}
      {showPJ&&<PJModal winners={pjWinners} selected={pjSel} onToggle={togglePJ} onConfirm={()=>setShowPJ(false)} onClose={()=>setShowPJ(false)}/>}
    </div>
  );
}

function App(){
  const [screen,setScreen]=useState('setup');
  const [teams,setTeams]=useState([]);
  return(
    <>
      <BgDecor/>
      <Header onBack={screen==='tournament'?()=>setScreen('setup'):null}/>
      {screen==='setup'&&<SetupScreen onStart={ts=>{setTeams(ts);setScreen('tournament');}}/>}
      {screen==='tournament'&&<TournamentView teams={teams}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
